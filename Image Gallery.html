<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #0d47a1, #1976d2);
  color: #fff;
  text-align: center;
  min-height: 100vh;
}

/* Glassmorphism Header */
.header {
  padding: 30px;
  margin: 20px auto;
  width: 90%;
  max-width: 1000px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}

.header p {
  font-size: 42px;
  font-weight: bold;
  text-shadow: 1px 1px 6px rgba(0,0,0,0.6);
}

.header img {
  margin-top: 15px;
  border-radius: 15px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.4);
}

/* Glassmorphism Navigation */
.topnav {
  overflow: hidden;
  display: flex;
  flex-wrap: wrap;
  justify-content: space-around;
  margin: 15px auto;
  width: 90%;
  max-width: 1000px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
  border-radius: 15px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  transition: 0.3s ease;
}

.topnav a {
  padding: 12px 16px;
  text-decoration: none;
  color: #e0f7ff;
  font-weight: bold;
  border-radius: 10px;
  transition: 0.3s;
}

.topnav a:hover {
  background: rgba(255,255,255,0.2);
  color: #fff;
  transform: scale(1.05);
}

/* Slideshow container */
.slideshow-container {
  max-width: 1000px;
  margin: 30px auto;
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* Slides */
.mySlides {display: none;}
img {vertical-align: middle; width: 100%;}

/* Buttons */
.prev, .next {
  cursor: pointer;
  position: absolute;
  top: 50%;
  width: auto;
  padding: 16px;
  margin-top: -22px;
  font-weight: bold;
  font-size: 20px;
  color: #fff;
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
  transition: 0.3s ease;
  user-select: none;
}

.prev:hover, .next:hover {
  background: rgba(0,0,0,0.6);
}

.next { right: 10px; }
.prev { left: 10px; }

/* Caption text */
.text {
  color: #f1f1f1;
  font-size: 18px;
  padding: 8px 12px;
  position: absolute;
  bottom: 15px;
  width: 100%;
  text-align: center;
  text-shadow: 1px 1px 6px rgba(0,0,0,0.7);
  background: rgba(0,0,0,0.2);
  border-radius: 10px;
}

/* Number text */
.numbertext {
  color: #f1f1f1;
  font-size: 14px;
  padding: 8px 12px;
  position: absolute;
  top: 0;
}

/* Dots */
.dot {
  cursor: pointer;
  height: 15px;
  width: 15px;
  margin: 0 3px;
  background-color: #bbb;
  border-radius: 50%;
  display: inline-block;
  transition: background-color 0.6s ease;
}

.active, .dot:hover {
  background-color: #fff;
}

/* Fading animation */
.fade {
  animation-name: fade;
  animation-duration: 1.5s;
}
@keyframes fade {
  from {opacity: .4} 
  to {opacity: 1}
}

/* Responsive */
@media only screen and (max-width: 600px) {
  .prev, .next,.text {font-size: 14px;}
  .topnav {flex-direction: column;}
}
</style>
</head>
<body>

<div class="header">
  <p>Image Gallery</p>
  <img src="IMG_20260301_041238.jpg" width="200" height="100">
</div>

<!-- Navigation Bar -->
<div class="topnav">
  <a href="http://localhost:8158/LCBA.html">About LCBA</a>
  <a href="http://localhost:8158/TVL-HE.html">TVL-HE</a>
  <a href="http://localhost:8158/Image Gallery.html">Image Gallery</a>
  <a href="http://localhost:8158/Video gallery.html">Video Gallery</a>
  <a href="http://localhost:8158/Games.html" style="float:right">Games</a>
</div>

<!-- Slideshow -->
<div class="slideshow-container">

<div class="mySlides fade">
  <div class="numbertext">1 / 3</div>
  <img src="Messenger_creation_39BB3E0C-25AE-4835-9CF2-11F76341862E.jpeg">
  <div class="text">Preparing</div>
</div>

<div class="mySlides fade">
  <div class="numbertext">2 / 3</div>
  <img src="Messenger_creation_71452111-69A9-427A-998A-42FDE41193BC.jpeg">
  <div class="text">Cooking</div>
</div>

<div class="mySlides fade">
  <div class="numbertext">3 / 3</div>
  <img src="Messenger_creation_AEEA2EE6-DCAB-4408-925D-0F0C26579707.jpeg">
  <div class="text">Serving</div>
</div>

<a class="prev" onclick="plusSlides(-1)">❮</a>
<a class="next" onclick="plusSlides(1)">❯</a>

</div>

<br>

<div style="text-align:center">
  <span class="dot" onclick="currentSlide(1)"></span> 
  <span class="dot" onclick="currentSlide(2)"></span> 
  <span class="dot" onclick="currentSlide(3)"></span> 
</div>

<script>
let slideIndex = 1;
showSlides(slideIndex);

function plusSlides(n) { showSlides(slideIndex += n); }
function currentSlide(n) { showSlides(slideIndex = n); }

function showSlides(n) {
  let i;
  let slides = document.getElementsByClassName("mySlides");
  let dots = document.getElementsByClassName("dot");
  if (n > slides.length) {slideIndex = 1}    
  if (n < 1) {slideIndex = slides.length}
  for (i = 0; i < slides.length; i++) { slides[i].style.display = "none"; }
  for (i = 0; i < dots.length; i++) { dots[i].className = dots[i].className.replace(" active", ""); }
  slides[slideIndex-1]
  .style.display = "block";  
  dots[slideIndex-1].className += " active";
}
</script>

</body>
</html>
